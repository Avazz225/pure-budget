name: Build Release

on:
  push:
    branches:
      - main
    paths:
      - 'pubspec.yaml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    environment: windows

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION_RAW=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          VERSION=$(echo "$VERSION_RAW" | sed 's/+[0-9]*/\.0/')
          VERSION_SHORT=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d '+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_short=$VERSION_SHORT" >> $GITHUB_OUTPUT
          echo "version_raw=$VERSION_RAW" >> $GITHUB_OUTPUT

      - name: Create keys.dart
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.version_short }}
          IOS_APP_GROUP_ID: ${{ secrets.IOS_APP_GROUP_ID }}
          ANDROID_QUALIFIED_NAME: ${{ secrets.ANDROID_QUALIFIED_NAME }}
          APP_USER_MODEL_ID: ${{ secrets.APP_USER_MODEL_ID }}
          GUID: ${{ secrets.GUID }}
          IOS_STORE_IDENTIFIER: ${{ secrets.IOS_STORE_IDENTIFIER }}

          GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          GOOGLE_DRIVE_CLIENT_KEY: ${{ secrets.GOOGLE_DRIVE_CLIENT_KEY }}

          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}

          ICLOUD_CLIENT_ID: ${{ secrets.ICLOUD_CLIENT_ID }}
          ICLOUD_SECRET: ${{ secrets.ICLOUD_SECRET }}

          EXPORT_IMPORT_KEY: ${{ secrets.EXPORT_IMPORT_KEY }}
          EXPORT_IMPORT_IV: ${{ secrets.EXPORT_IMPORT_IV }}

          ANDROID_APP_UNIT_ID: ${{ secrets.ANDROID_APP_UNIT_ID }}
          IOS_APP_UNIT_ID: ${{ secrets.IOS_APP_UNIT_ID }}

          PRO_VERSION_PRODUCT_ID_ANDROID: ${{ secrets.PRO_VERSION_PRODUCT_ID_ANDROID }}
          PRO_VERSION_PRODUCT_ID_IOS: ${{ secrets.PRO_VERSION_PRODUCT_ID_IOS }}

          APP_STORE_LINK: ${{ vars.APP_STORE_LINK }}
          PLAY_STORE_LINK: ${{ vars.PLAY_STORE_LINK }}
          REPORT_EMAIL: ${{ vars.REPORT_EMAIL }}
          ICLOUD_REDIRECT_URI: ${{ vars.ICLOUD_REDIRECT_URI }}
          DESKTOP_AD_WEBSITE_URL: ${{ vars.DESKTOP_AD_WEBSITE_URL }}
          PRIVACY_NOTICE_URL: ${{ vars.PRIVACY_NOTICE_URL }}
          PRO_VERSION_WINDOWS_PURCHASE_URL: ${{ vars.PRO_VERSION_WINDOWS_PURCHASE_URL }}

        run: |
          @"
          const appVersion = "$env:APP_VERSION";

          const iosAppGroupId = "$env:IOS_APP_GROUP_ID";
          const androidQualifiedName = "$env:ANDROID_QUALIFIED_NAME";
          const appUserModelId = "$env:APP_USER_MODEL_ID";
          const guid = "$env:GUID";
          const iosStoreIdentifier = "$env:IOS_STORE_IDENTIFIER";

          const appStoreLink = "$env:APP_STORE_LINK";
          const playStoreLink = "$env:PLAY_STORE_LINK";

          const ratingMinDays = 3;
          const ratingMinLaunches = 5;
          const ratingRemindDays = 14;
          const ratingRemindLaunches = 10;

          const reportEmail = "$env:REPORT_EMAIL";

          const googleDriveClientId = "$env:GOOGLE_DRIVE_CLIENT_ID";
          const googleDriveClientKey = "$env:GOOGLE_DRIVE_CLIENT_KEY";

          const oneDriveClientId = "$env:ONEDRIVE_CLIENT_ID";
          const oneDriveClientSecret = "$env:ONEDRIVE_CLIENT_SECRET";
          const oneDriveRedirectUri = "http://localhost";

          const iCloudClientId = "$env:ICLOUD_CLIENT_ID";
          const iCloudRedirectUri = "$env:ICLOUD_REDIRECT_URI";
          const iCloudSecret = "$env:ICLOUD_SECRET";

          const exportImportKey = "$env:EXPORT_IMPORT_KEY";
          const exportImportIv = "$env:EXPORT_IMPORT_IV";

          const androidAppUnitId = "$env:ANDROID_APP_UNIT_ID";
          const iosAppUnitId = "$env:IOS_APP_UNIT_ID";

          const desktopAdWebsiteUrl = "$env:DESKTOP_AD_WEBSITE_URL";

          const privacyNoticeUrl = "$env:PRIVACY_NOTICE_URL";

          const String proVersionProductIdAndroid = "$env:PRO_VERSION_PRODUCT_ID_ANDROID";
          const String proVersionProductIdIos = "$env:PRO_VERSION_PRODUCT_ID_IOS";
          const String proVersionProductIdMac = "";
          const String proVersionProductIdWindows = "";
          const String proVersionWindowsPurchaseUrl = "$env:PRO_VERSION_WINDOWS_PURCHASE_URL";
          "@ | Set-Content lib\keys.dart -Encoding UTF8

      - name: Build MSIX (Store)
        env:
          PUBLISHER: ${{ secrets.PUBLISHER }}
          IDENTITY: ${{ secrets.IDENTITY }}
        run: |
          dart run msix:create `
            --store true `
            --version "${{ steps.version.outputs.version }}" `
            -n "pureBudget_release" `
            -b "$env:PUBLISHER" `
            -i "$env:IDENTITY"

      - name: Upload MSIX
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ steps.version.outputs.version }}
          path: build/windows/x64/runner/Release/*.msix