name: Build Release

on:
  push:
    branches:
      - main
    paths:
      - 'pubspec.yaml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    environment: windows

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION_RAW=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          VERSION=$(echo "$VERSION_RAW" | sed 's/+[0-9]*/\.0/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_raw=$VERSION_RAW" >> $GITHUB_OUTPUT

      - name: Build MSIX (Store)
        env:
          PUBLISHER: ${{ secrets.PUBLISHER }}
          IDENTITY: ${{ secrets.IDENTITY }}
        run: |
          dart run msix:create `
            --store true `
            --version "${{ steps.version.outputs.version }}" `
            -n "pureBudget_release" `
            -b "$PUBLISHER" `
            -i "$IDENTITY"

      - name: Upload MSIX
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ steps.version.outputs.version }}
          path: build/windows/x64/runner/Release/*.msix